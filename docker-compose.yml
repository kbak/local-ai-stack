services:
  searxng:
    image: searxng/searxng
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml
    networks:
      - ai-net
    mem_limit: 512m


  mcp-proxy:
    build: ./mcp-proxy
    container_name: mcp-proxy
    restart: unless-stopped
    ports:
      - "8083:8083"
    volumes:
      - ./mcp-proxy-config.json:/config.json
      - mcp-proxy-uv-cache:/root/.cache/uv
    command: ["--host", "0.0.0.0", "--port", "8083", "--transport", "streamablehttp", "--named-server-config", "/config.json"]
    networks:
      - ai-net
    mem_limit: 1500m

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    networks:
      - ai-net
    mem_limit: 512m

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped
    ports:
      - "3000:3080"
    env_file:
      - .env
    volumes:
      - ./librechat.yaml:/app/librechat.yaml
      - librechat-data:/app/client/public/images
    depends_on:
      - mongodb
      - mcp-proxy
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 768m

  signal-api:
    image: bbernhard/signal-cli-rest-api
    container_name: signal-api
    restart: unless-stopped
    ports:
      - "9922:8080"
    volumes:
      - signal-cli-data:/home/.local/share/signal-cli
    environment:
      - MODE=native
      - AUTO_RECEIVE_SCHEDULE=0 */6 * * *
    networks:
      - ai-net
    mem_limit: 512m

  signal-bot:
    build:
      context: .
      dockerfile: signal-bot.Dockerfile
    container_name: signal-bot
    restart: unless-stopped
    env_file:
      - ./signal-bot.env
    volumes:
      - ./signal-bot-custom-skills:/app/data/custom_skills
      - signal-bot-data:/app/data
      - signal-cli-data:/signal-cli-data:ro
    depends_on:
      - signal-api
      - mcp-proxy
      - searxng
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m

networks:
  ai-net:
    driver: bridge

volumes:
  mcp-proxy-uv-cache:
  mongodb-data:
  librechat-data:
  signal-cli-data:
  signal-bot-data:
