services:
  searxng:
    image: searxng/searxng
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml
    networks:
      - ai-net
    mem_limit: 512m


  mcp-proxy:
    build: ./mcp-proxy
    container_name: mcp-proxy
    restart: unless-stopped
    ports:
      - "8083:8083"
    env_file:
      - .env
    volumes:
      - ./mcp-proxy-config.json:/config.json
      - mcp-proxy-uv-cache:/root/.cache/uv
    command: ["--host", "0.0.0.0", "--port", "8083", "--transport", "streamablehttp", "--named-server-config", "/config.json", "--pass-environment", "--auth-bearer-token", "${MCP_PROXY_AUTH_TOKEN}"]
    networks:
      - ai-net
    mem_limit: 1500m

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    networks:
      - ai-net
    mem_limit: 512m

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped
    ports:
      - "3000:3080"
    env_file:
      - .env
    volumes:
      - ./librechat.yaml:/app/librechat.yaml.template:ro
      - librechat-data:/app/client/public/images
    depends_on:
      - mongodb
      - mcp-proxy
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 768m
    entrypoint: ["/bin/sh", "-c", "node -e \"const fs=require('fs');fs.writeFileSync('/app/librechat.yaml',fs.readFileSync('/app/librechat.yaml.template','utf8').replace(/\\$\\{([^}]+)\\}/g,(_,k)=>process.env[k]||''))\" && exec node /app/api/server/index.js"]

  signal-api:
    image: bbernhard/signal-cli-rest-api
    container_name: signal-api
    restart: unless-stopped
    ports:
      - "9922:8080"
    volumes:
      - signal-cli-data:/home/.local/share/signal-cli
    environment:
      - MODE=native
      - AUTO_RECEIVE_SCHEDULE=0 */6 * * *
    networks:
      - ai-net
    mem_limit: 512m

  signal-bot:
    build:
      context: .
      dockerfile: signal-bot.Dockerfile
    container_name: signal-bot
    restart: unless-stopped
    env_file:
      - ./signal-bot.env
    volumes:
      - ./signal-bot-custom-skills:/app/data/custom_skills
      - signal-bot-data:/app/data
      - signal-cli-data:/signal-cli-data:ro
    depends_on:
      - signal-api
      - mcp-proxy
      - searxng
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m

  location-tracker:
    build:
      context: .
      dockerfile: location-tracker/Dockerfile
    container_name: location-tracker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - location-tracker-data:/data
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m

  calendar-watcher:
    build:
      context: .
      dockerfile: calendar-watcher/Dockerfile
    container_name: calendar-watcher
    restart: unless-stopped
    env_file:
      - .env
      - signal-bot.env
    volumes:
      - calendar-watcher-data:/data
    depends_on:
      - location-tracker
      - mcp-proxy
      - signal-api
      - searxng
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m

networks:
  ai-net:
    driver: bridge

volumes:
  mcp-proxy-uv-cache:
  mongodb-data:
  librechat-data:
  signal-cli-data:
  signal-bot-data:
  location-tracker-data:
  calendar-watcher-data:
