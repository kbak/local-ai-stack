services:
  searxng:
    image: searxng/searxng
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml
    networks:
      - ai-net
    mem_limit: 512m


  mcp-proxy:
    build: ./mcp-proxy
    container_name: mcp-proxy
    restart: unless-stopped
    ports:
      - "8083:8083"
    env_file:
      - .env
    volumes:
      - ./mcp-proxy-config.json:/config.json
      - mcp-proxy-uv-cache:/root/.cache/uv
    environment:
      MCP_PROXY_AUTH_TOKEN: ""
    command: ["--host", "0.0.0.0", "--port", "8083", "--transport", "streamablehttp", "--named-server-config", "/config.json", "--pass-environment"]
    networks:
      - ai-net
    mem_limit: 1500m

  audio-api:
    build:
      context: .
      dockerfile: audio-api/Dockerfile
    container_name: audio-api
    restart: unless-stopped
    ports:
      - "8088:8088"
    env_file:
      - ./audio-api.env
    networks:
      - ai-net
    mem_limit: 3000m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  voice-agent:
    build:
      context: ./voice-agent
      dockerfile: Dockerfile
    container_name: voice-agent
    restart: unless-stopped
    ports:
      - "8087:8087"
    volumes:
      - ./signal-bot-custom-skills:/app/skills:ro
      - ./voice-agent/static:/app/static:ro
    depends_on:
      - audio-api
      - mcp-proxy
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    networks:
      - ai-net
    mem_limit: 512m

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped
    ports:
      - "3000:3080"
    env_file:
      - .env
    volumes:
      - ./librechat.yaml:/app/librechat.yaml.template:ro
      - ./librechat-render.js:/app/librechat-render.js:ro
      - librechat-data:/app/client/public/images
      - ${MEMORY_DIR:?MEMORY_DIR must be set in .env}:/memory:ro
    depends_on:
      - mongodb
      - mcp-proxy
      - audio-api
      - memory-mcp
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 768m
    entrypoint: ["/bin/sh", "-c", "node /app/librechat-render.js && exec node /app/api/server/index.js"]

  signal-api:
    image: bbernhard/signal-cli-rest-api
    container_name: signal-api
    restart: unless-stopped
    ports:
      - "9922:8080"
    volumes:
      - signal-cli-data:/home/.local/share/signal-cli
    environment:
      - MODE=native
      - AUTO_RECEIVE_SCHEDULE=0 */6 * * *
    networks:
      - ai-net
    mem_limit: 512m

  signal-bot:
    build:
      context: .
      dockerfile: signal-bot.Dockerfile
    container_name: signal-bot
    restart: unless-stopped
    env_file:
      - ./signal-bot.env
    environment:
      MEMORY_MCP_URL: http://memory-mcp:8089
      MEMORY_DIR_MOUNT: /memory
      MEMORY_DEFAULT_USER_ID: ${MEMORY_DEFAULT_USER_ID:-default}
    volumes:
      - ./signal-bot-custom-skills:/app/data/custom_skills
      - signal-bot-data:/app/data
      - signal-cli-data:/signal-cli-data:ro
      - ${MUSIC_HOST_DIR:-D:/backup/Music}:/music
      - ${MEMORY_DIR:?MEMORY_DIR must be set in .env}:/memory:ro
    depends_on:
      - signal-api
      - mcp-proxy
      - searxng
      - audio-api
      - memory-mcp
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 1500m

  location-tracker:
    build:
      context: .
      dockerfile: location-tracker/Dockerfile
    container_name: location-tracker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - location-tracker-data:/data
      - ./shared:/shared:ro
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m

  pdf-inspector:
    build:
      context: .
      dockerfile: pdf-inspector/Dockerfile
    container_name: pdf-inspector
    restart: unless-stopped
    ports:
      - "8086:8085"
    environment:
      TRANSPORT: http
    networks:
      - ai-net
    mem_limit: 512m

  calendar-watcher:
    build:
      context: .
      dockerfile: calendar-watcher/Dockerfile
    container_name: calendar-watcher
    restart: unless-stopped
    env_file:
      - .env
      - signal-bot.env
    volumes:
      - calendar-watcher-data:/data
      - ./shared:/shared:ro
    depends_on:
      - location-tracker
      - mcp-proxy
      - signal-api
      - searxng
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m

  tg-watcher:
    build:
      context: .
      dockerfile: tg-watcher/Dockerfile
    container_name: tg-watcher
    restart: unless-stopped
    env_file:
      - .env
      - signal-bot.env
      - tg-watcher.env
    volumes:
      - tg-watcher-data:/data
      - ./shared:/shared:ro
    depends_on:
      - signal-api
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m

  oss-watcher:
    build:
      context: .
      dockerfile: oss-watcher/Dockerfile
    container_name: oss-watcher
    restart: unless-stopped
    env_file:
      - .env
      - signal-bot.env
      - oss-watcher.env
    volumes:
      - ./shared:/shared:ro
    depends_on:
      - signal-api
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 256m

  rss-watcher:
    build:
      context: .
      dockerfile: rss-watcher/Dockerfile
    container_name: rss-watcher
    restart: unless-stopped
    env_file:
      - signal-bot.env
      - rss-watcher.env
    volumes:
      - ./shared:/shared:ro
    depends_on:
      - signal-api
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 256m

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ${MEMORY_DIR:?MEMORY_DIR must be set in .env}/qdrant:/qdrant/storage
    networks:
      - ai-net
    mem_limit: 1024m

  memory-mcp:
    build:
      context: .
      dockerfile: memory-mcp/Dockerfile
    container_name: memory-mcp
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      MEMORY_LLM_BASE_URL: http://host.docker.internal:8080/v1
      MEMORY_LLM_MODEL: qwen
      MEMORY_QDRANT_HOST: qdrant
      MEMORY_QDRANT_PORT: "6333"
      MEMORY_DEFAULT_USER_ID: ${MEMORY_DEFAULT_USER_ID:-default}
    volumes:
      - ${MEMORY_DIR:?MEMORY_DIR must be set in .env}:/memory
    depends_on:
      - qdrant
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 3000m

networks:
  ai-net:
    driver: bridge

volumes:
  mcp-proxy-uv-cache:
  mongodb-data:
  librechat-data:
  signal-cli-data:
  signal-bot-data:
  location-tracker-data:
  calendar-watcher-data:
  tg-watcher-data:
