services:
  searxng:
    image: searxng/searxng
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml
    networks:
      - ai-net
    mem_limit: 512m


  mcp-proxy:
    build: ./mcp-proxy
    container_name: mcp-proxy
    restart: unless-stopped
    ports:
      - "8083:8083"
    env_file:
      - .env
    volumes:
      - ./mcp-proxy-config.json:/config.json
      - mcp-proxy-uv-cache:/root/.cache/uv
    environment:
      MCP_PROXY_AUTH_TOKEN: ""
    command: ["--host", "0.0.0.0", "--port", "8083", "--transport", "streamablehttp", "--named-server-config", "/config.json", "--pass-environment"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8083/status', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - ai-net
    mem_limit: 1500m

  audio-api:
    build:
      context: .
      dockerfile: audio-api/Dockerfile
    container_name: audio-api
    restart: unless-stopped
    ports:
      - "8088:8088"
    env_file:
      - ./audio-api.env
    environment:
      CUDA_VISIBLE_DEVICES: ${SECONDARY_GPU:-0}
      HF_HOME: /app/hf-cache
      VOICE_SAMPLES_DIR: /app/voice-samples
    volumes:
      - ${VOICE_SAMPLES_DIR:?VOICE_SAMPLES_DIR must be set in .env}:/app/voice-samples:ro
      - audio-api-hf-cache:/app/hf-cache
    networks:
      - ai-net
    mem_limit: 8000m

  voice-agent:
    build:
      context: .
      dockerfile: voice-agent/Dockerfile
    container_name: voice-agent
    restart: unless-stopped
    ports:
      - "8087:8087"
    volumes:
      - ./signal-bot-custom-skills:/app/skills:ro
      - ./voice-agent/static:/app/static:ro
      - ./shared:/shared:ro
    depends_on:
      - audio-api
      - mcp-proxy
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    networks:
      - ai-net
    mem_limit: 512m

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped
    ports:
      - "3000:3080"
    env_file:
      - .env
    volumes:
      - ./librechat.yaml:/app/librechat.yaml.template:ro
      - ./librechat-render.js:/app/librechat-render.js:ro
      - librechat-data:/app/client/public/images
      - ${MEMORY_DIR:?MEMORY_DIR must be set in .env}:/memory:ro
    depends_on:
      mongodb:
        condition: service_started
      mcp-proxy:
        condition: service_healthy
      audio-api:
        condition: service_started
      memory-mcp:
        condition: service_started
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 768m
    entrypoint: ["/bin/sh", "-c", "node /app/librechat-render.js && exec node /app/api/server/index.js"]

  signal-api:
    image: bbernhard/signal-cli-rest-api
    container_name: signal-api
    restart: unless-stopped
    ports:
      - "9922:8080"
    volumes:
      - signal-cli-data:/home/.local/share/signal-cli
    environment:
      - MODE=native
      - AUTO_RECEIVE_SCHEDULE=0 */6 * * *
    networks:
      - ai-net
    mem_limit: 512m

  signal-bot:
    build:
      context: .
      dockerfile: signal-bot.Dockerfile
    container_name: signal-bot
    restart: unless-stopped
    env_file:
      - ./signal-bot.env
    environment:
      MEMORY_MCP_URL: http://memory-mcp:8089
      MEMORY_DIR_MOUNT: /memory
      MEMORY_DEFAULT_USER_ID: ${MEMORY_DEFAULT_USER_ID:-default}
    volumes:
      - ./signal-bot-custom-skills:/app/data/custom_skills
      - signal-bot-data:/app/data
      - signal-cli-data:/signal-cli-data:ro
      - ${MUSIC_HOST_DIR:?MUSIC_HOST_DIR must be set in .env}:/music
      - ${VOICE_SAMPLES_DIR:?VOICE_SAMPLES_DIR must be set in .env}:/app/voice-samples
      - ${MEMORY_DIR:?MEMORY_DIR must be set in .env}:/memory:ro
    depends_on:
      signal-api:
        condition: service_started
      mcp-proxy:
        condition: service_healthy
      searxng:
        condition: service_started
      audio-api:
        condition: service_started
      memory-mcp:
        condition: service_started
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 1500m

  location-tracker:
    build:
      context: .
      dockerfile: location-tracker/Dockerfile
    container_name: location-tracker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - location-tracker-data:/data
      - ./shared:/shared:ro
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m

  pdf-inspector:
    build:
      context: .
      dockerfile: pdf-inspector/Dockerfile
    container_name: pdf-inspector
    restart: unless-stopped
    ports:
      - "8086:8085"
    environment:
      TRANSPORT: http
    networks:
      - ai-net
    mem_limit: 512m

  calendar-watcher:
    build:
      context: .
      dockerfile: calendar-watcher/Dockerfile
    container_name: calendar-watcher
    restart: unless-stopped
    env_file:
      - .env
      - signal-bot.env
    volumes:
      - calendar-watcher-data:/data
      - ./shared:/shared:ro
    depends_on:
      - location-tracker
      - mcp-proxy
      - signal-api
      - searxng
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m

  receipt-watcher:
    build:
      context: .
      dockerfile: receipt-watcher/Dockerfile
    container_name: receipt-watcher
    restart: unless-stopped
    env_file:
      - .env
      - signal-bot.env
      - receipt-watcher.env
    volumes:
      - receipt-watcher-data:/data
      - ./receipt-watcher/accounts.yaml:/app/accounts.yaml:ro
      - ./receipt-watcher/vendors.yaml:/app/vendors.yaml:ro
      - ./receipt-watcher/secrets:/app/secrets:ro
      - ./shared:/shared:ro
    depends_on:
      - signal-api
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m

  tg-watcher:
    build:
      context: .
      dockerfile: tg-watcher/Dockerfile
    container_name: tg-watcher
    restart: unless-stopped
    env_file:
      - .env
      - signal-bot.env
      - tg-watcher.env
    volumes:
      - tg-watcher-data:/data
      - ./shared:/shared:ro
    depends_on:
      - signal-api
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m

  oss-watcher:
    build:
      context: .
      dockerfile: oss-watcher/Dockerfile
    container_name: oss-watcher
    restart: unless-stopped
    env_file:
      - .env
      - signal-bot.env
      - oss-watcher.env
    volumes:
      - ./shared:/shared:ro
    depends_on:
      - signal-api
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 256m

  rss-watcher:
    build:
      context: .
      dockerfile: rss-watcher/Dockerfile
    container_name: rss-watcher
    restart: unless-stopped
    env_file:
      - signal-bot.env
      - rss-watcher.env
    volumes:
      - ./shared:/shared:ro
    depends_on:
      - signal-api
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 256m

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ${MEMORY_DIR:?MEMORY_DIR must be set in .env}/qdrant:/qdrant/storage
    networks:
      - ai-net
    mem_limit: 1024m

  memory-mcp:
    build:
      context: .
      dockerfile: memory-mcp/Dockerfile
    container_name: memory-mcp
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      MEMORY_LLM_BASE_URL: http://host.docker.internal:8080/v1
      # MEMORY_LLM_MODEL intentionally unset - memory_backend resolves the
      # largest non-coder model currently loaded in llama-swap at startup.
      MEMORY_QDRANT_HOST: qdrant
      MEMORY_QDRANT_PORT: "6333"
      MEMORY_DEFAULT_USER_ID: ${MEMORY_DEFAULT_USER_ID:-default}
    volumes:
      - ${MEMORY_DIR:?MEMORY_DIR must be set in .env}:/memory
      - ./shared:/shared:ro
    depends_on:
      - qdrant
    networks:
      - ai-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 3000m

networks:
  ai-net:
    driver: bridge

volumes:
  mcp-proxy-uv-cache:
  mongodb-data:
  librechat-data:
  signal-cli-data:
  signal-bot-data:
  location-tracker-data:
  calendar-watcher-data:
  receipt-watcher-data:
  tg-watcher-data:
  audio-api-hf-cache:
