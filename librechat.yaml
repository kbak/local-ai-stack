version: 1.3.6

mcpSettings:
  allowedDomains:
    - "http://mcp-proxy:8083"
    - "http://location-tracker:8084"
    - "http://pdf-inspector:8085/"
    - "http://memory-mcp:8089"
    - "http://audio-api:8088"
  autoApprove: true

speech:
