        - zf_xiaoxiao
        - zf_xiaoyi
        - zm_yunjian
        - zm_yunxi
        - zm_yunxia
        - zm_yunyang
  stt:
    openai:
      url: "http://audio-api:8088/v1"
      apiKey: "sk-no-key-required"
      model: "whisper-1"
  speechTab:
    conversationMode: true
    speechToText:
      engineSTT: "openai"
      autoTranscribeAudio: true
    textToSpeech:
      engineTTS: "openai"
      voice: "bm_george"
      automaticPlayback: true

endpoints:
  custom:
    - name: "llama.cpp"
      apiKey: "vllm"
      baseURL: "http://host.docker.internal:8080/v1"
      models:
        default: ["qwen3.6-27B-FP8"]
        fetch: true
      titleConvo: true
      titleModel: "current_model"
      titleMessageRole: "user"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "llama.cpp"
      maxContextTokens: 65536

mcpServers:
  searxng:
    url: http://mcp-proxy:8083/servers/searxng/mcp
    type: streamable-http
    serverInstructions: false
  time:
    url: http://mcp-proxy:8083/servers/time/mcp
    type: streamable-http
    serverInstructions: false
  fetch:
    url: http://mcp-proxy:8083/servers/fetch/mcp
    type: streamable-http
    serverInstructions: false
  arxiv:
    url: http://mcp-proxy:8083/servers/arxiv/mcp
    type: streamable-http
    serverInstructions: false
  youtube:
    url: http://mcp-proxy:8083/servers/youtube/mcp
    type: streamable-http
    serverInstructions: false
  hackernews:
    url: http://mcp-proxy:8083/servers/hackernews/mcp
    type: streamable-http
    serverInstructions: false
  weather:
    url: http://mcp-proxy:8083/servers/weather/mcp
    type: streamable-http
    serverInstructions: false
  currency:
    url: http://mcp-proxy:8083/servers/currency/mcp
    type: streamable-http
    serverInstructions: false
  finance:
    url: http://mcp-proxy:8083/servers/finance/mcp
    type: streamable-http
    serverInstructions: false
  github:
    url: http://mcp-proxy:8083/servers/github/mcp
    type: streamable-http
    serverInstructions: false
  google-maps:
    url: http://mcp-proxy:8083/servers/google-maps/mcp
    type: streamable-http
    serverInstructions: false
  pdf-inspector:
    url: http://pdf-inspector:8085/sse/
    type: sse
    serverInstructions: false
  location-tracker:
    url: http://location-tracker:8084/mcp
    type: streamable-http
    serverInstructions: false
    headers:
      Authorization: "Bearer ${MCP_PROXY_AUTH_TOKEN}"
  memory:
    url: http://memory-mcp:8089/mcp/mcp
    type: streamable-http
    serverInstructions: false
  chatterbox:
    url: http://audio-api:8088/mcp/mcp
    type: streamable-http
    serverInstructions: false
