version: 1.3.6

mcpSettings:
  allowedDomains:
    - "http://mcp-proxy:8083"
  autoApprove: true

endpoints:
  custom:
    - name: "llama.cpp"
      apiKey: "none"
      baseURL: "http://host.docker.internal:8080/v1"
      models:
        default: ["qwen", "gemma4"]
        fetch: false
      titleConvo: false
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "llama.cpp"
      maxContextTokens: 262144

modelSpecs:
  enforce: false
  prioritize: true
  list:
    - name: "qwen"
      label: "Qwen 3.5 35B"
      preset:
        endpoint: "llama.cpp"
        model: "qwen"
        maxContextTokens: 262144
    - name: "gemma4"
      label: "Gemma 4 31B"
      preset:
        endpoint: "llama.cpp"
        model: "gemma4"
        maxContextTokens: 262144

mcpServers:
  searxng:
    url: http://mcp-proxy:8083/servers/searxng/mcp
    type: streamable-http
    serverInstructions: false
  time:
    url: http://mcp-proxy:8083/servers/time/mcp
    type: streamable-http
    serverInstructions: false
  fetch:
    url: http://mcp-proxy:8083/servers/fetch/mcp
    type: streamable-http
    serverInstructions: false
  wikipedia:
