    openai:
      url: "http://audio-api:8088/v1/audio/speech"
      apiKey: "sk-no-key-required"
      model: "kokoro"
      voices:
        - af_alloy
        - af_aoede
        - af_bella
        - af_heart
        - af_jessica
        - af_kore
        - af_nicole
        - af_nova
