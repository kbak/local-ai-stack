version: 1.1.5

mcpSettings:
  allowedDomains:
    - "http://mcp-proxy:8083"
  autoApprove: true

endpoints:
  custom:
    - name: "llama.cpp"
      apiKey: "none"
      baseURL: "http://host.docker.internal:8080/v1"
      models:
        default: ["qwen", "gemma4"]
        fetch: false
      titleConvo: false
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "llama.cpp"
      maxContextTokens: 350000
      agentOptions:
        agent: "classic"
mcpServers:
  searxng:
    url: http://mcp-proxy:8083/servers/searxng/mcp
    type: streamable-http
  time:
    url: http://mcp-proxy:8083/servers/time/mcp
    type: streamable-http
  fetch:
    url: http://mcp-proxy:8083/servers/fetch/mcp
    type: streamable-http
  wikipedia:
    url: http://mcp-proxy:8083/servers/wikipedia/mcp
    type: streamable-http
  arxiv:
    url: http://mcp-proxy:8083/servers/arxiv/mcp
    type: streamable-http
  youtube:
    url: http://mcp-proxy:8083/servers/youtube/mcp
    type: streamable-http
  hackernews:
    url: http://mcp-proxy:8083/servers/hackernews/mcp
    type: streamable-http
  pdf:
    url: http://mcp-proxy:8083/servers/pdf/mcp
    type: streamable-http
  semantic-scholar:
    url: http://mcp-proxy:8083/servers/semantic-scholar/mcp
    type: streamable-http
  patents:
    url: http://mcp-proxy:8083/servers/patents/mcp
    type: streamable-http
  weather:
    url: http://mcp-proxy:8083/servers/weather/mcp
    type: streamable-http
  currency:
    url: http://mcp-proxy:8083/servers/currency/mcp
    type: streamable-http
  finance:
    url: http://mcp-proxy:8083/servers/finance/mcp
    type: streamable-http
