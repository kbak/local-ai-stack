listen: "0.0.0.0:8080"

# vLLM cold start (compile cache miss) on Qwen3.6-27B can take 5-10 min.
# Default 120s would kill it.
healthCheckTimeout: 900

models:
  qwen3.6-27B-FP8:
    cmd: bash /mnt/d/ai/local-ai-stack/vllm-launcher.sh ${PORT}
    proxy: http://127.0.0.2:${PORT}
    checkEndpoint: /v1/models
    ttl: 0

  qwen3.6-35B-A3B-FP8:
    cmd: bash /mnt/d/ai/local-ai-stack/vllm-launcher-35b-a3b.sh ${PORT}
    proxy: http://127.0.0.2:${PORT}
    checkEndpoint: /v1/models
    ttl: 0

  # FIM autocomplete model on the 5060 Ti (kept off the primary GPU so it
  # doesn't contend with the main chat model). FP16, ~3 GB weights + small KV
  # cache. Always-loaded via the cuda1 group so VS Code tab-complete never
  # pays a cold-start cost.
  #
  # CUDA_VISIBLE_DEVICES hides the primary GPU from this subprocess entirely;
  # with only the 5060 Ti visible vLLM uses it as cuda:0.
  qwen-coder-1.5B:
    env:
      - "CUDA_VISIBLE_DEVICES=${env.SECONDARY_GPU}"
    cmd: bash /mnt/d/ai/local-ai-stack/vllm-launcher-coder.sh ${PORT}
    proxy: http://127.0.0.2:${PORT}
    checkEndpoint: /v1/models
    ttl: 0

# Three independent groups, all on exclusive: false so they coexist:
#   - cuda0_main (RTX 6000 / 96 GB): 35B-A3B always-loaded, never evicted.
#   - cuda0_ondemand (same GPU): 27B loads on first request and stays. Sole
#     member of its swap group + ttl: 0 means nothing displaces it.
#   - cuda1 (5060 Ti / 16 GB): coder model, persistent, always-loaded.
groups:
  "cuda0_main":
    swap: false
    exclusive: false
    persistent: true
    members:
      - "qwen3.6-35B-A3B-FP8"

  "cuda0_ondemand":
    swap: true
    exclusive: false
    members:
      - "qwen3.6-27B-FP8"

  "cuda1":
    swap: false
    exclusive: false
    persistent: true
    members:
      - "qwen-coder-1.5B"
