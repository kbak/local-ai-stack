listen: "0.0.0.0:8080"

# vLLM cold start (compile cache miss) on Qwen3.6-27B can take 5-10 min.
# Default 120s would kill it.
healthCheckTimeout: 900

models:
  qwen3.6-27B-FP8:
    cmd: bash ./serve-qwen-27b.sh ${PORT}
    proxy: http://127.0.0.2:${PORT}
    checkEndpoint: /v1/models
    ttl: 0

  qwen3.6-35B-A3B-FP8:
    cmd: bash ./serve-qwen-35b-a3b.sh ${PORT}
    proxy: http://127.0.0.2:${PORT}
    checkEndpoint: /v1/models
    ttl: 0

  # FIM autocomplete model on the 5060 Ti (kept off the primary GPU so it
  # doesn't contend with the main chat model). FP16, ~3 GB weights + small KV
  # cache. Always-loaded via the cuda1 group so VS Code tab-complete never
  # pays a cold-start cost.
  #
  # CUDA_VISIBLE_DEVICES hides the primary GPU from this subprocess entirely;
  # with only the 5060 Ti visible vLLM uses it as cuda:0.
  qwen-coder-7B:
    cmd: bash ./serve-qwen-coder-7b.sh ${PORT}
    proxy: http://127.0.0.2:${PORT}
    checkEndpoint: /v1/models
    ttl: 0

  # FLUX.1-dev FP8 image generation via stable-diffusion.cpp (sd-server).
  # Replaces the SwarmUI+ComfyUI Docker stack. The playground UI at /ui
  # serves as the human-facing frontend.
  # sd-server must be in PATH — build with -DSD_CUBLAS=on from leejet/stable-diffusion.cpp.
  flux-dev:
    cmd: bash ./serve-sdcpp.sh ${PORT}
    proxy: http://127.0.0.2:${PORT}
    checkEndpoint: /v1/models
    ttl: 600

  # Cross-encoder reranker on the 5060 Ti (~1.1 GB weights, persistent).
  # vLLM 0.20.1 uses --runner pooling (not --task score).
  # Endpoint: POST /v1/score with {"model":"bge-reranker-v2-m3","text_1":"query","text_2":["doc1","doc2"]}
  bge-reranker-v2-m3:
    cmd: bash ./serve-reranker.sh ${PORT}
    proxy: http://127.0.0.2:${PORT}
    checkEndpoint: /v1/models
    ttl: 0

# Groups, all exclusive: false so they coexist on shared GPUs:
#   cuda0 (RTX 6000 / 96 GB):
#     - cuda0_main:     35B-A3B, always-loaded, never evicted.
#     - cuda0_ondemand: 27B, loads on first request, stays (ttl: 0).
#     - cuda0_coder:    coder-7B, persistent, primary-GPU autocomplete.
#     - cuda0_image:    FLUX-dev, swap=true + ttl:600 to reclaim VRAM when idle.
#   cuda1 (5060 Ti / 16 GB):
#     - cuda1_reranker: bge-reranker-v2-m3, persistent, tiny footprint.
groups:
  "cuda0_main":
    swap: false
    exclusive: false
    persistent: true
    members:
      - "qwen3.6-35B-A3B-FP8"

  "cuda0_ondemand":
    swap: true
    exclusive: false
    members:
      - "qwen3.6-27B-FP8"

  "cuda0_coder":
    swap: false
    exclusive: false
    persistent: true
    members:
      - "qwen-coder-7B"

  # Image gen on the primary GPU. Not persistent — swaps out after ttl idle
  # to free VRAM headroom for the 27B model if both are needed concurrently.
  "cuda0_image":
    swap: true
    exclusive: false
    members:
      - "flux-dev"

  # Reranker on the 5060 Ti alongside audio-api. Persistent: tiny model, no
  # reason to pay the vLLM startup cost on each request.
  "cuda1_reranker":
    swap: false
    exclusive: false
    persistent: true
    members:
      - "bge-reranker-v2-m3"
