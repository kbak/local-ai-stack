listen: "0.0.0.0:8080"

models:
  qwen3.6-27B-Q5_K_XL:
    cmd: llama-server --port ${PORT} -hf unsloth/Qwen3.6-27B-GGUF --hf-file Qwen3.6-27B-UD-Q5_K_XL.gguf --device CUDA0 --split-mode none --n-gpu-layers 999 --parallel 1 --flash-attn on --batch-size 4096 --ubatch-size 1024 --ctx-size 131072 --no-mmap
    ttl: 0

  qwen3.6-27B-Q6:
    cmd: llama-server --port ${PORT} -hf unsloth/Qwen3.6-27B-GGUF --hf-file Qwen3.6-27B-Q6_K.gguf --device CUDA0 --split-mode none --n-gpu-layers 999 --parallel 1 --flash-attn on --batch-size 4096 --ubatch-size 1024 --ctx-size 100000 --no-mmap
    ttl: 0

  qwen3.6-35B-A3B:
    cmd: llama-server --port ${PORT} -hf unsloth/Qwen3.6-35B-A3B-GGUF --hf-file Qwen3.6-35B-A3B-UD-Q5_K_S.gguf --device CUDA0 --split-mode none --n-gpu-layers 999 --parallel 1 --flash-attn on --batch-size 4096 --ubatch-size 1024 --ctx-size 170000 --no-mmap
    ttl: 0

  gemma4-31B:
    cmd: llama-server --port ${PORT} -hf ggml-org/gemma-4-31B-it-GGUF:Q4_K_M --device CUDA0 --split-mode none --n-gpu-layers 999 --parallel 1 --flash-attn on --cache-type-k q4_0 --cache-type-v q4_0 --batch-size 4096 --ubatch-size 4096 --ctx-size 262144
    ttl: 0

  # FIM autocomplete model, lives on the 5060 Ti so it doesn't contend with the
  # main chat model on the 5090. Small ctx + small batch so startup is fast and
  # VRAM footprint stays ~2 GB. Kept always-loaded so VS Code tab-complete never
  # pays a cold-start cost.
  qwen-coder-1.5B:
    cmd: llama-server --port ${PORT} -hf bartowski/Qwen2.5-Coder-1.5B-Instruct-GGUF --hf-file Qwen2.5-Coder-1.5B-Instruct-Q5_K_M.gguf --device CUDA1 --split-mode none --n-gpu-layers 999 --parallel 1 --flash-attn on --batch-size 1024 --ubatch-size 256 --ctx-size 32768 --no-mmap
    ttl: 0

# Two independent groups:
#   - main (CUDA0 / 5090): one chat model at a time, swappable. exclusive=false
#     so loading a main model does NOT unload the coder group.
#   - coder (CUDA1 / 5060 Ti): always loaded, persistent so main-group swaps
#     never evict it. swap=false so multiple coder models could coexist
#     (we only have one today, but future-proof).
groups:
  "main":
    swap: true
    exclusive: false
    members:
      - "qwen3.6-27B-Q5_K_XL"
      - "qwen3.6-27B-Q6"
      - "qwen3.6-35B-A3B"
      - "gemma4-31B"

  "coder":
    swap: false
    exclusive: false
    persistent: true
    members:
      - "qwen-coder-1.5B"
