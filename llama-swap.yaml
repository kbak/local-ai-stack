listen: "0.0.0.0:8080"

# vLLM cold start (compile cache miss) on Qwen3.6-27B can take 5-10 min.
# Default 120s would kill it.
healthCheckTimeout: 900

models:
  qwen3.6-27B-FP8:
    cmd: wsl.exe -d Ubuntu-24.04 -- bash /mnt/d/ai/local-ai-stack/vllm-launcher.sh ${PORT}
    proxy: http://127.0.0.1:${PORT}
    checkEndpoint: /v1/models
    ttl: 0

  qwen3.6-35B-A3B-FP8:
    cmd: wsl.exe -d Ubuntu-24.04 -- bash /mnt/d/ai/local-ai-stack/vllm-launcher-35b-a3b.sh ${PORT}
    proxy: http://127.0.0.1:${PORT}
    checkEndpoint: /v1/models
    ttl: 0

  qwen3.5-9B:
    cmd: llama-server --port ${PORT} -hf unsloth/Qwen3.5-9B-GGUF --hf-file Qwen3.5-9B-Q5_K_M.gguf --device CUDA0 --split-mode none --n-gpu-layers 999 --parallel 1 --flash-attn on --batch-size 2048 --ubatch-size 512 --ctx-size 4096 --no-mmap --cache-reuse 256
    ttl: 0

  # FIM autocomplete model, lives on the 5060 Ti so it doesn't contend with the
  # main chat model on the 5090. Small ctx + small batch so startup is fast and
  # VRAM footprint stays ~2 GB. Kept always-loaded so VS Code tab-complete never
  # pays a cold-start cost.
  #
  # CUDA_VISIBLE_DEVICES hides the 5090 from this subprocess entirely so
  # llama.cpp can't allocate its default ~1.5 GB per-device context buffer on
  # CUDA0. With only the 5060 Ti visible it reindexes to CUDA0 inside the
  # process -- that's why --device is CUDA0 here, not CUDA1.
  qwen-coder-1.5B:
    env:
      - "CUDA_VISIBLE_DEVICES=${env.SECONDARY_GPU}"
    cmd: llama-server --port ${PORT} -hf bartowski/Qwen2.5-Coder-1.5B-Instruct-GGUF --hf-file Qwen2.5-Coder-1.5B-Instruct-Q5_K_M.gguf --device CUDA0 --split-mode none --n-gpu-layers 999 --parallel 1 --flash-attn on --batch-size 1024 --ubatch-size 256 --ctx-size 16384 --no-mmap
    ttl: 0

# Two independent groups:
#   - main (CUDA0 / 5090): one chat model at a time, swappable. exclusive=false
#     so loading a main model does NOT unload the cuda1 group.
#   - cuda1 (CUDA1 / 5060 Ti): coder + fallback chat model. Both always loaded,
#     persistent so main-group swaps never evict them. swap=false so the two
#     models coexist on the same GPU.
groups:
  "main":
    swap: true
    exclusive: false
    members:
      - "qwen3.6-27B-FP8"
      - "qwen3.6-35B-A3B-FP8"
      - "qwen3.5-9B"

  "cuda1":
    swap: false
    exclusive: false
    persistent: true
    members:
      - "qwen-coder-1.5B"
