name: stack

services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ${MEMORY_DIR:?MEMORY_DIR must be set in .env}/qdrant:/qdrant/storage
    networks:
      - ai-net
    mem_limit: 1024m

  memory-mcp:
    build:
      context: .
      dockerfile: memory-mcp/Dockerfile
    container_name: memory-mcp
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      MEMORY_LLM_BASE_URL: "http://host.docker.internal:8080/v1"
      MEMORY_QDRANT_HOST: qdrant
      MEMORY_QDRANT_PORT: "6333"
      MEMORY_DEFAULT_USER_ID: ${MEMORY_DEFAULT_USER_ID:-default}
    extra_hosts:
      - "host.docker.internal:172.18.0.1"
    volumes:
      - ./shared:/shared:ro
    depends_on:
      - qdrant
    networks:
      - ai-net
    mem_limit: 3000m

  audio-api:
    build:
      context: .
      dockerfile: audio-api/Dockerfile
    container_name: audio-api
    restart: unless-stopped
    ports:
      - "8088:8088"
    env_file:
      - ./audio-api.env
    environment:
      CUDA_VISIBLE_DEVICES: ${SECONDARY_GPU:-0}
      HF_HOME: /app/hf-cache
      VOICE_SAMPLES_DIR: /app/voice-samples
    volumes:
      - ${VOICE_SAMPLES_DIR:?VOICE_SAMPLES_DIR must be set in .env}:/app/voice-samples:ro
      - audio-api-hf-cache:/app/hf-cache
    networks:
      - ai-net
    mem_limit: 8000m

networks:
  ai-net:
    external: true
    name: stack_ai-net

volumes:
  audio-api-hf-cache:
