name: stack

# Mini PC stack — lightweight always-on services.
# LLM inference and audio models live on the AI PC (docker-compose.ai.yml);
# this stack reaches them via stable Tailscale hostnames.
#
# Fallback: if the mini PC fails, run this file on the AI PC (WSL) alongside
# docker-compose.ai.yml, then run `scripts/dns-failover.sh failover` to redirect
# DNS. No config changes needed — the *.kacper.me hostnames resolve to the same
# machine in both modes.

services:
  searxng:
    image: searxng/searxng
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml
    networks:
      - server-net
    mem_limit: 512m

  mcp-proxy:
    build: ./mcp-proxy
    container_name: mcp-proxy
    restart: unless-stopped
    ports:
      - "8083:8083"
    env_file:
      - .env
    volumes:
      - ./mcp-proxy-config.json:/config.json
      - mcp-proxy-uv-cache:/root/.cache/uv
    environment:
      MCP_PROXY_AUTH_TOKEN: ""
    command: ["--host", "0.0.0.0", "--port", "8083", "--transport", "streamablehttp", "--named-server-config", "/config.json", "--pass-environment"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8083/status', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - server-net
    mem_limit: 1500m

  voice-agent:
    build:
      context: .
      dockerfile: voice-agent/Dockerfile
    container_name: voice-agent
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      AUDIO_API_URL: "${AUDIO_API_URL:-https://audio.kacper.me}"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://llama.kacper.me/v1}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./signal-bot-custom-skills:/app/skills:ro
      - ./voice-agent/static:/app/static:ro
      - ./shared:/shared:ro
    depends_on:
      mcp-proxy:
        condition: service_healthy
    networks:
      - server-net
    mem_limit: 512m

  mongodb:
    image: mongo:8.0
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    networks:
      - server-net
    mem_limit: 512m

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped
    ports:
      - "3000:3080"
    env_file:
      - .env
    environment:
      AUDIO_API_BASE_URL: "${AUDIO_API_URL:-https://audio.kacper.me}"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://llama.kacper.me/v1}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./librechat.yaml:/app/librechat.yaml.template:ro
      - ./librechat-render.js:/app/librechat-render.js:ro
      - librechat-data:/app/client/public/images
      - ${MEMORY_DIR:?MEMORY_DIR must be set in .env}:/memory:ro
    depends_on:
      mongodb:
        condition: service_started
      mcp-proxy:
        condition: service_healthy
    networks:
      - server-net
    mem_limit: 768m
    entrypoint: ["/bin/sh", "-c", "node /app/librechat-render.js && exec node /app/api/server/index.js"]

  signal-api:
    image: bbernhard/signal-cli-rest-api
    container_name: signal-api
    restart: unless-stopped
    ports:
      - "9922:8080"
    volumes:
      - signal-cli-data:/home/.local/share/signal-cli
    environment:
      - MODE=native
      - AUTO_RECEIVE_SCHEDULE=0 */6 * * *
    networks:
      - server-net
    mem_limit: 512m

  signal-bot:
    build:
      context: .
      dockerfile: signal-bot.Dockerfile
    container_name: signal-bot
    restart: unless-stopped
    env_file:
      - ./signal-bot.env
    environment:
      LLM_BASE_URL: "${LLM_BASE_URL:-https://llama.kacper.me/v1}"
      AUDIO_API_URL: "${AUDIO_API_URL:-https://audio.kacper.me}"
      YTDLP_SERVICE_URL: "${YTDLP_SERVICE_URL:-https://yt.kacper.me}"
      MEMORY_MCP_URL: https://memory.kacper.me
      MEMORY_DIR_MOUNT: /memory
      MEMORY_DEFAULT_USER_ID: ${MEMORY_DEFAULT_USER_ID:-default}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./signal-bot-custom-skills:/app/data/custom_skills
      - signal-bot-data:/app/data
      - signal-cli-data:/signal-cli-data:ro
      - ${MUSIC_HOST_DIR:?MUSIC_HOST_DIR must be set in .env}:/music
      - ${VOICE_SAMPLES_DIR:?VOICE_SAMPLES_DIR must be set in .env}:/app/voice-samples
      - ${MEMORY_DIR:?MEMORY_DIR must be set in .env}:/memory:ro
      - ./shared:/shared:ro
    depends_on:
      signal-api:
        condition: service_started
      mcp-proxy:
        condition: service_healthy
      searxng:
        condition: service_started
    networks:
      - server-net
    mem_limit: 1500m

  location-tracker:
    build:
      context: .
      dockerfile: location-tracker/Dockerfile
    container_name: location-tracker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LLM_BASE_URL: "${LLM_BASE_URL:-https://llama.kacper.me/v1}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - location-tracker-data:/data
      - ./shared:/shared:ro
    networks:
      - server-net
    mem_limit: 512m

  pdf-inspector:
    build:
      context: .
      dockerfile: pdf-inspector/Dockerfile
    container_name: pdf-inspector
    restart: unless-stopped
    ports:
      - "8086:8085"
    environment:
      TRANSPORT: http
    networks:
      - server-net
    mem_limit: 512m

  calendar-watcher:
    build:
      context: .
      dockerfile: calendar-watcher/Dockerfile
    container_name: calendar-watcher
    restart: unless-stopped
    env_file:
      - .env
      - signal-bot.env
    environment:
      LLM_BASE_URL: "${LLM_BASE_URL:-https://llama.kacper.me/v1}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - calendar-watcher-data:/data
      - ./shared:/shared:ro
    depends_on:
      location-tracker:
        condition: service_started
      mcp-proxy:
        condition: service_healthy
      signal-api:
        condition: service_started
      searxng:
        condition: service_started
    networks:
      - server-net
    mem_limit: 512m

  receipt-watcher:
    build:
      context: .
      dockerfile: receipt-watcher/Dockerfile
    container_name: receipt-watcher
    restart: unless-stopped
    env_file:
      - .env
      - signal-bot.env
      - receipt-watcher.env
    environment:
      LLM_BASE_URL: "${LLM_BASE_URL:-https://llama.kacper.me/v1}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - receipt-watcher-data:/data
      - ./receipt-watcher/accounts.yaml:/app/accounts.yaml:ro
      - ./receipt-watcher/vendors.yaml:/app/vendors.yaml:ro
      - ./receipt-watcher/secrets:/app/secrets:ro
      - ./shared:/shared:ro
    depends_on:
      - signal-api
    networks:
      - server-net
    mem_limit: 512m

  tg-watcher:
    build:
      context: .
      dockerfile: tg-watcher/Dockerfile
    container_name: tg-watcher
    restart: unless-stopped
    env_file:
      - .env
      - signal-bot.env
      - tg-watcher.env
    environment:
      LLM_BASE_URL: "${LLM_BASE_URL:-https://llama.kacper.me/v1}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - tg-watcher-data:/data
      - ./shared:/shared:ro
    depends_on:
      - signal-api
    networks:
      - server-net
    mem_limit: 512m

  oss-watcher:
    build:
      context: .
      dockerfile: oss-watcher/Dockerfile
    container_name: oss-watcher
    restart: unless-stopped
    env_file:
      - .env
      - signal-bot.env
      - oss-watcher.env
    environment:
      LLM_BASE_URL: "${LLM_BASE_URL:-https://llama.kacper.me/v1}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./shared:/shared:ro
    depends_on:
      - signal-api
    networks:
      - server-net
    mem_limit: 256m

  rss-watcher:
    build:
      context: .
      dockerfile: rss-watcher/Dockerfile
    container_name: rss-watcher
    restart: unless-stopped
    env_file:
      - signal-bot.env
      - rss-watcher.env
    environment:
      LLM_BASE_URL: "${LLM_BASE_URL:-https://llama.kacper.me/v1}"
      AUDIO_API_URL: "${AUDIO_API_URL:-https://audio.kacper.me}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./shared:/shared:ro
    depends_on:
      - signal-api
    networks:
      - server-net
    mem_limit: 256m

  nextcloud-db:
    image: mariadb:10.11
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${NEXTCLOUD_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - nextcloud-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    networks:
      - server-net
    mem_limit: 512m

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    networks:
      - server-net
    mem_limit: 128m

  nextcloud:
    image: nextcloud:33-apache
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "8090:80"
    environment:
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      REDIS_HOST: nextcloud-redis
      NEXTCLOUD_TRUSTED_DOMAINS: localhost 127.0.0.1 ${NEXTCLOUD_TAILSCALE_HOST}
      OVERWRITEPROTOCOL: https
      OVERWRITEHOST: ${NEXTCLOUD_TAILSCALE_HOST}
      OVERWRITECLIURL: https://${NEXTCLOUD_TAILSCALE_HOST}
    volumes:
      - nextcloud-data:/var/www/html
      - ./nextcloud/hooks:/docker-entrypoint-hooks.d:ro
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_started
    networks:
      - server-net
    mem_limit: 1024m

  nextcloud-cron:
    image: nextcloud:33-apache
    container_name: nextcloud-cron
    restart: unless-stopped
    volumes:
      - nextcloud-data:/var/www/html
    entrypoint: /cron.sh
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_started
    networks:
      - server-net
    mem_limit: 256m

  reverse-image-search:
    build:
      context: .
      dockerfile: reverse-image-search/Dockerfile
    container_name: reverse-image-search
    restart: unless-stopped
    ports:
      - "8091:8091"
    environment:
      SAUCENAO_API_KEY: ${SAUCENAO_API_KEY:-}
      LLM_BASE_URL: "${LLM_BASE_URL:-https://llama.kacper.me/v1}"
      SEARXNG_URL: "http://searxng:8080"
    networks:
      - server-net
    mem_limit: 256m


networks:
  server-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.19.0.0/16
          gateway: 172.19.0.1

volumes:
  mcp-proxy-uv-cache:
  mongodb-data:
  librechat-data:
  signal-cli-data:
  signal-bot-data:
  location-tracker-data:
  calendar-watcher-data:
  receipt-watcher-data:
  tg-watcher-data:
  nextcloud-db:
  nextcloud-data:

