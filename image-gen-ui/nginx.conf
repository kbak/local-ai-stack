server {
    listen 7802;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Resolve image-gen lazily — its container may not be up when nginx starts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ──── Reverse proxy to SwarmUI ────────────────────────────────────────
    # The frontend talks to the SwarmUI API as same-origin via /api/* and
    # /view/* under :7802. This avoids CORS entirely (no preflights, no
    # Settings.fds tweaks). SwarmUI's actual paths are case-sensitive
    # (/API and /View), so we rewrite before proxying.
    location /api/ {
        set $upstream http://image-gen:7801;
        rewrite ^/api/(.*)$ /API/$1 break;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $http_connection;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering    off;
    }

    location /view/ {
        set $upstream http://image-gen:7801;
        rewrite ^/view/(.*)$ /View/$1 break;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /output/ {
        set $upstream http://image-gen:7801;
        rewrite ^/output/(.*)$ /Output/$1 break;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ──── Static frontend ────────────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
