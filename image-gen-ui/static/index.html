<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <title>Image</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Image</h1>
        <div class="header-actions">
            <button id="modelBtn" type="button" title="Load model"
                    aria-label="Load model" data-state="unknown">
                <span class="model-dot" aria-hidden="true"></span>
                <span class="model-label">…</span>
            </button>
            <button id="clearBtn" type="button" title="Clear history" aria-label="Clear history">Clear</button>
        </div>
    </header>

    <main id="feed" aria-live="polite"></main>

    <form id="composer" autocomplete="off">
        <div id="promptWrap">
            <textarea
                id="prompt"
                placeholder="Describe an image..."
                rows="1"
                required
                spellcheck="true"
                autocapitalize="sentences"
                autofocus></textarea>
            <button id="expandBtn" type="button" aria-label="Expand prompt with LLM"
                    title="Expand prompt with LLM">
                <svg class="icon-expand" width="16" height="16" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round"
                     stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 3l1.9 4.6L18.5 9.5l-4.6 1.9L12 16l-1.9-4.6L5.5 9.5l4.6-1.9L12 3z"></path>
                    <path d="M19 14l.8 1.8L21.5 16.5l-1.8.8L19 19l-.8-1.7-1.7-.8 1.7-.8L19 14z"></path>
                </svg>
                <svg class="icon-expand-stop" width="14" height="14" viewBox="0 0 24 24"
                     fill="currentColor" aria-hidden="true">
                    <rect x="5" y="5" width="14" height="14" rx="2"></rect>
                </svg>
                <span class="spinner" aria-hidden="true"></span>
            </button>
        </div>
        <button id="genBtn" type="submit" aria-label="Generate">
            <svg class="icon-send" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="12" y1="19" x2="12" y2="5"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
            <svg class="icon-stop" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"
                 aria-hidden="true">
                <rect x="5" y="5" width="14" height="14" rx="2"></rect>
            </svg>
        </button>
    </form>

    <dialog id="lightbox" aria-label="Full size image">
        <img id="lightboxImg" alt="">
    </dialog>

    <script src="app.js"></script>
</body>
</html>
